[build]
  publish = "."

[[redirects]]
  from = "/elementor-390"
  to = "/le-tao/"
  status = 301

[[redirects]]
  from = "/elementor-390/"
  to = "/le-tao/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
